<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#1A0F3C"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>
  <!-- Ticket body -->
  <rect x="4" y="10" width="56" height="44" rx="6" fill="url(#bg)" stroke="#9B59B6" stroke-width="2"/>
  <!-- Perforated line -->
  <line x1="18" y1="10" x2="18" y2="54" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Stub accent lines -->
  <line x1="9" y1="22" x2="13" y2="22" stroke="#9B59B6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="28" x2="13" y2="28" stroke="#9B59B6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="34" x2="13" y2="34" stroke="#9B59B6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="40" x2="13" y2="40" stroke="#9B59B6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star -->
  <polygon points="40,18 43.5,28 54,28 45.8,34 49,44 40,38 31,44 34.2,34 26,28 36.5,28" fill="url(#star)"/>
  <!-- Sparkles -->
  <circle cx="28" cy="20" r="1.2" fill="#FFD700" opacity="0.8"/>
  <circle cx="52" cy="40" r="1" fill="#FFD700" opacity="0.7"/>
  <circle cx="25" cy="42" r="0.8" fill="#FFD700" opacity="0.6"/>
</svg>
